services:
  - type: web
    name: facial-attendance-backend
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: npm run dev
    envVars:
      - key: MONGO_URI
        scope: build,runtime
      - key: JWT_SECRET
        scope: build,runtime
      - key: EMAIL_USER
        scope: build,runtime
      - key: EMAIL_PASS
        scope: build,runtime
      - key: ADMIN_USER
        scope: build,runtime
      - key: ADMIN_PASS
        scope: build,runtime
      - key: PORT
        value: "5000"
